<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy's Barcode Generator</title>
    <!-- We are using a professional Barcode Library called JsBarcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; text-align: center; }
        h1, h3 { color: #333; }
        table { width: 100%; max-width: 800px; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .barcode-svg { width: 150px; height: auto; }
        @media print { .print-btn { display: none; } }
        .print-btn { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Department of Computer Science</h1>
    <h3>Inventory Barcode List</h3>
    <p>Student: <strong>Joy Chidinma Apollos</strong></p>

    <button class="print-btn" onclick="window.print()">Print Barcodes</button>

    <table>
        <thead>
            <tr>
                <th>S/N</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Barcode Data</th>
                <th>Barcode</th>
            </tr>
        </thead>
        <tbody id="barcode-table">
            <!-- Data from your Word document -->
        </tbody>
    </table>

    <script>
        const inventory = [
            { sn: 1, name: "Milk", price: "₦4,500", data: "MILK-4500" },
            { sn: 2, name: "Bread", price: "₦1,800", data: "BREAD-1800" },
            { sn: 3, name: "Milo", price: "₦4,500", data: "MILO-4500" },
            { sn: 4, name: "Cereal", price: "₦3,800", data: "CEREAL-3800" },
            { sn: 5, name: "Rice", price: "₦1,500", data: "RICE-1500" }
        ];

        const tableBody = document.getElementById('barcode-table');

        inventory.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.sn}</td>
                <td>${item.name}</td>
                <td>${item.price}</td>
                <td>${item.data}</td>
                <td><svg id="code-${item.sn}" class="barcode-svg"></svg></td>
            `;
            tableBody.appendChild(row);

            // This line generates the "Real" scannable barcode
            JsBarcode(`#code-${item.sn}`, item.data, {
                format: "CODE128",
                lineColor: "#000",
                width: 2,
                height: 40,
                displayValue: true
            });
        });
    </script>

</body>
</html>
